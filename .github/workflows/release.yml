name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Generate changelog (inline commit history)
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          {
            echo "## Humble Apollo ${TAG}"
            echo
            if [ -n "$PREV" ]; then
              echo "### Commits since ${PREV}"
              RANGE="${PREV}..${TAG}"
            else
              echo "### Commits"
              RANGE="${TAG}"
            fi
            echo
            git log --no-merges --pretty=format:'- %s (%h) — %an' "$RANGE"
            echo
            if [ -n "$PREV" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > CHANGELOG_RELEASE.md
          echo "----- release body -----"
          cat CHANGELOG_RELEASE.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-ext-artifacts/*.zip
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: false
